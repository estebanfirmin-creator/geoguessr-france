<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FranceGuessr</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet/dist/leaflet.css"
  />

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial,sans-serif;
    }

    body{
      overflow:hidden;
      background:black;
    }

    #street-view{
      width:100vw;
      height:100vh;
    }

    /* MAP */

    #map-container{

      position:absolute;

      bottom:20px;
      right:20px;

      width:320px;
      height:220px;

      border-radius:16px;

      overflow:hidden;

      z-index:1000;

      transition:all 0.4s ease;

      box-shadow:0 0 20px rgba(0,0,0,0.5);

    }

    /* GRANDE MAP */

    #map-container.expanded{

      width:650px;
      height:450px;

    }

    /* FULLSCREEN */

    #map-container.fullscreen{

      width:100vw;
      height:100vh;

      top:0;
      left:0;
      right:0;
      bottom:0;

      border-radius:0;

    }

    #map{
      width:100%;
      height:100%;
    }

    /* CONTROLS */

    .controls{

      position:absolute;

      top:10px;
      left:10px;

      z-index:3000;

      display:flex;
      gap:10px;

    }

    button{

      border:none;

      padding:10px 15px;

      border-radius:10px;

      cursor:pointer;

      font-weight:bold;

      background:#111;

      color:white;

      font-size:16px;

    }

    button:hover{
      background:#222;
    }

    /* RETOUR POSITION */

    #reset-position-btn{

      position:absolute;

      bottom:20px;
      left:20px;

      z-index:4000;

      width:55px;
      height:55px;

      border:none;

      border-radius:50%;

      background:#111;

      color:white;

      font-size:28px;

      cursor:pointer;

      display:flex;

      align-items:center;
      justify-content:center;

      box-shadow:0 0 15px rgba(0,0,0,0.4);

    }

    #reset-position-btn:hover{
      background:#222;
    }

    /* RESULT BOX */

    #result-box{

      position:absolute;

      bottom:30px;
      left:50%;

      transform:translateX(-50%);

      width:700px;
      max-width:90%;

      background:rgba(30,30,30,0.95);

      border-radius:20px;

      padding:25px;

      z-index:5000;

      display:none;

      color:white;

      text-align:center;

      box-shadow:0 0 25px rgba(0,0,0,0.5);

    }

    #distance-text{

      font-size:40px;
      font-weight:bold;

      margin-bottom:20px;

    }

    #continue-btn{

      width:100%;

      padding:18px;

      font-size:24px;

      border-radius:15px;

      background:#2ecc71;

      color:white;

      border:none;

      cursor:pointer;

      font-weight:bold;

    }

    #continue-btn:hover{
      background:#27ae60;
    }

  </style>
</head>
<body>

<!-- STREET VIEW -->
<div id="street-view"></div>

<!-- RESULT -->
<div id="result-box">

  <div id="distance-text">
    Bravo : 0 km
  </div>

  <button id="continue-btn" onclick="nextRound()">
    Continuer
  </button>

</div>

<!-- MAP -->
<div id="map-container">

  <div class="controls" id="controls">

    <button onclick="toggleMap()">
      🗺️
    </button>

    <button onclick="validateGuess()">
      Valider
    </button>

  </div>

  <div id="map"></div>

</div>

<!-- RETOUR POSITION -->
<button id="reset-position-btn"
onclick="resetPosition()">
  ↩️
</button>

<!-- LEAFLET -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<!-- GOOGLE -->
<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyB-Ip7Tdn0LQn2XXeIh1K5ksvuIMuwjV50&libraries=geometry"></script>

<script type="module">

  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

  import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-analytics.js";

  // For Firebase JS SDK v7.20.0 and later, measurementId is optional

    apiKey: "AIzaSyDjup1pMAENznn129njn4qnqoTasaN9-n8",

    authDomain: "franceguessr-d1706.firebaseapp.com",

    projectId: "franceguessr-d1706",

    appId: "1:232820209634:web:8326a8f01fcbadc18a6bbb",

    measurementId: "G-7NX61P86N8"

  };

  const app = initializeApp(firebaseConfig);

<script>

/* STREET VIEW SERVICE */

const streetViewService =
  new google.maps.StreetViewService();

let map;
let playerMarker;
let realMarker;
let line;

let panorama;

let selectedLatLng = null;
let realPosition = null;

let roundEnded = false;

const mapContainer =
  document.getElementById("map-container");

const resultBox =
  document.getElementById("result-box");

const distanceText =
  document.getElementById("distance-text");

/* LIMITES FRANCE */

const franceBounds = L.latLngBounds(
  L.latLng(41.0, -8.5),
  L.latLng(51.8, 10.0)
);

/* RANDOM LOCATION */

async function randomLocation(){

  return new Promise((resolve) => {

    function tryLocation(){

      const lat =
        Math.random() *
        (50.5 - 42.3)
        + 42.3;

      const lng =
        Math.random() *
        (7.8 - (-4.9))
        + (-4.9);

      const location = {
        lat: lat,
        lng: lng
      };

      streetViewService.getPanorama({

        location: location,

        radius: 5000,

        source:
          google.maps.StreetViewSource.OUTDOOR

      }, (data, status) => {

        if(
          status === 'OK' &&
          data &&
          data.location &&
          data.location.latLng
        ){

          const panoLat =
            data.location.latLng.lat();

          const panoLng =
            data.location.latLng.lng();

          if(

            panoLat >= 42.3 &&
            panoLat <= 50.5 &&

            panoLng >= -4.9 &&
            panoLng <= 7.8

          ){

            resolve({

              lat: panoLat,

              lng: panoLng

            });

          } else {

            tryLocation();

          }

        } else {

          tryLocation();

        }

      });

    }

    tryLocation();

  });

}

/* MAP SIZE */

function toggleMap(){

  if(
    !mapContainer.classList.contains(
      "fullscreen"
    )
  ){

    mapContainer.classList.toggle(
      "expanded"
    );

    setTimeout(() => {
      map.invalidateSize();
    }, 400);

  }

}

/* INIT */

function initGame(){

  map = L.map('map', {

    maxBounds: franceBounds,

    maxBoundsViscosity: 1.0,

    minZoom: 5

  }).setView(
    [46.603354, 1.888334],
    6
  );

  L.tileLayer(
    'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
    {
      attribution:
      '&copy; OpenStreetMap contributors'
    }
  ).addTo(map);

  map.on('click', function(e){

    // EMPÊCHE CHANGEMENT
    // APRÈS VALIDATION

    if(roundEnded){
      return;
    }

    selectedLatLng = e.latlng;

    if(playerMarker){
      map.removeLayer(playerMarker);
    }

    playerMarker =
      L.marker(e.latlng).addTo(map);

  });

  startRound();

}

/* RECENTER */

function recenterFrance(){

  map.setView(
    [46.603354, 1.888334],
    6
  );

}

/* RETOUR POSITION */

function resetPosition(){

  if(panorama){

    panorama.setPov({
      heading:34,
      pitch:10
    });

    panorama.setZoom(1);

    panorama.setPosition(
      realPosition
    );

  }

}

/* START ROUND */

async function startRound(){

  resultBox.style.display = "none";

  roundEnded = false;

  document.getElementById(
    "controls"
  ).style.display = "flex";

  document.getElementById(
    "reset-position-btn"
  ).style.display = "flex";

  mapContainer.classList.remove(
    "fullscreen"
  );

  mapContainer.classList.remove(
    "expanded"
  );

  recenterFrance();

  const location =
    await randomLocation();

  realPosition =
    new google.maps.LatLng(
      location.lat,
      location.lng
    );

  panorama =
    new google.maps.StreetViewPanorama(
      document.getElementById(
        "street-view"
      ),
      {
        position: realPosition,

        pov:{
          heading:34,
          pitch:10
        },

        zoom:1,

        addressControl:false,

        fullscreenControl:false
      }
    );

}

/* VALIDATE */

function validateGuess(){

  if(!selectedLatLng){

    alert("Clique sur la map");

    return;
  }

  const guess =
    new google.maps.LatLng(
      selectedLatLng.lat,
      selectedLatLng.lng
    );

  const distance =
    google.maps.geometry
    .spherical
    .computeDistanceBetween(
      realPosition,
      guess
    );

  const distanceKm =
    (distance / 1000).toFixed(2);

  roundEnded = true;

  /* FULLSCREEN */

  mapContainer.classList.add(
    "fullscreen"
  );

  document.getElementById(
    "controls"
  ).style.display = "none";

  document.getElementById(
    "reset-position-btn"
  ).style.display = "none";

  setTimeout(() => {
    map.invalidateSize();
  }, 500);

  /* BON POINT */

  realMarker = L.circleMarker([
    realPosition.lat(),
    realPosition.lng()
  ], {

    radius:10,

    color:"green",

    fillColor:"green",

    fillOpacity:1

  }).addTo(map);

  /* LIGNE */

  line = L.polyline([
    [
      selectedLatLng.lat,
      selectedLatLng.lng
    ],
    [
      realPosition.lat(),
      realPosition.lng()
    ]
  ]).addTo(map);

  /* ZOOM */

  map.fitBounds(
    line.getBounds(),
    {
      padding:[100,100]
    }
  );

  /* DISTANCE */

  distanceText.innerHTML =
    "Bravo : " +
    distanceKm +
    " km";

  resultBox.style.display =
    "block";

}

/* NEXT ROUND */

function nextRound(){

  if(playerMarker)
    map.removeLayer(playerMarker);

  if(realMarker)
    map.removeLayer(realMarker);

  if(line)
    map.removeLayer(line);

  selectedLatLng = null;

  recenterFrance();

  startRound();

}

window.onload = initGame;

</script>

</body>
</html>
