<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GeoGuessr France</title>

  <!-- Leaflet -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet/dist/leaflet.css"
  />

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial,sans-serif;
    }

    body{
      overflow:hidden;
      background:black;
    }

    #street-view{
      width:100vw;
      height:100vh;
    }

    /* MAP */

    #map-container{

      position:absolute;

      bottom:20px;
      right:20px;

      width:320px;
      height:220px;

      border-radius:16px;

      overflow:hidden;

      z-index:1000;

      transition:all 0.4s ease;

      box-shadow:0 0 20px rgba(0,0,0,0.5);

    }

    /* GRANDE MAP (PAS FULLSCREEN) */

    #map-container.expanded{

      width:650px;
      height:450px;

    }

    /* FULLSCREEN APRÈS VALIDATION */

    #map-container.fullscreen{

      width:100vw;
      height:100vh;

      top:0;
      left:0;
      right:0;
      bottom:0;

      border-radius:0;

    }

    #map{
      width:100%;
      height:100%;
    }

    /* CONTROLS */

    .controls{

      position:absolute;

      top:10px;
      left:10px;

      z-index:3000;

      display:flex;
      gap:10px;

    }

    button{

      border:none;

      padding:10px 15px;

      border-radius:10px;

      cursor:pointer;

      font-weight:bold;

      background:#111;

      color:white;

      font-size:16px;

    }

    button:hover{
      background:#222;
    }

    /* RESULT BOX */

    #result-box{

      position:absolute;

      bottom:30px;
      left:50%;

      transform:translateX(-50%);

      width:700px;
      max-width:90%;

      background:rgba(30,30,30,0.95);

      border-radius:20px;

      padding:25px;

      z-index:5000;

      display:none;

      color:white;

      text-align:center;

      box-shadow:0 0 25px rgba(0,0,0,0.5);

    }

    #distance-text{

      font-size:40px;
      font-weight:bold;

      margin-bottom:20px;

    }

    #continue-btn{

      width:100%;

      padding:18px;

      font-size:24px;

      border-radius:15px;

      background:#2ecc71;

      color:white;

      border:none;

      cursor:pointer;

      font-weight:bold;

    }

    #continue-btn:hover{
      background:#27ae60;
    }

  </style>
</head>
<body>

<!-- STREET VIEW -->
<div id="street-view"></div>

<!-- RESULT -->
<div id="result-box">

  <div id="distance-text">
    0 km
  </div>

  <button id="continue-btn" onclick="nextRound()">
    Continuer
  </button>

</div>

<!-- MAP -->
<div id="map-container">

  <div class="controls">

    <button onclick="toggleMap()">
      🗺️
    </button>

    <button onclick="validateGuess()">
      Valider
    </button>

  </div>

  <div id="map"></div>

</div>

<!-- LEAFLET -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<!-- GOOGLE -->
<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyB-Ip7Tdn0LQn2XXeIh1K5ksvuIMuwjV50&libraries=geometry"></script>

<script>

let map;
let playerMarker;
let realMarker;
let line;

let panorama;

let selectedLatLng = null;
let realPosition = null;

const mapContainer =
  document.getElementById("map-container");

const resultBox =
  document.getElementById("result-box");

const distanceText =
  document.getElementById("distance-text");

const franceLocations = [

  { lat:48.8566, lng:2.3522 },
  { lat:43.2965, lng:5.3698 },
  { lat:45.7640, lng:4.8357 },
  { lat:50.6292, lng:3.0573 },
  { lat:48.5734, lng:7.7521 },
  { lat:43.6047, lng:1.4442 },
  { lat:44.8378, lng:-0.5792 },
  { lat:47.2184, lng:-1.5536 },
  { lat:43.7102, lng:7.2620 },
  { lat:49.2583, lng:4.0317 }

];

function randomLocation(){

  return franceLocations[
    Math.floor(
      Math.random() * franceLocations.length
    )
  ];

}

/* AVANT VALIDATION :
   PETITE -> GRANDE
*/

function toggleMap(){

  if(
    !mapContainer.classList.contains(
      "fullscreen"
    )
  ){

    mapContainer.classList.toggle(
      "expanded"
    );

    setTimeout(() => {
      map.invalidateSize();
    }, 400);

  }

}

function initGame(){

  map = L.map('map').setView(
    [46.603354, 1.888334],
    5
  );

  L.tileLayer(
    'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
    {
      attribution:
      '&copy; OpenStreetMap contributors'
    }
  ).addTo(map);

  map.on('click', function(e){

    selectedLatLng = e.latlng;

    if(playerMarker){
      map.removeLayer(playerMarker);
    }

    playerMarker =
      L.marker(e.latlng).addTo(map);

  });

  startRound();

}

function startRound(){

  resultBox.style.display = "none";

  mapContainer.classList.remove(
    "fullscreen"
  );

  mapContainer.classList.remove(
    "expanded"
  );

  const location = randomLocation();

  realPosition =
    new google.maps.LatLng(
      location.lat,
      location.lng
    );

  panorama =
    new google.maps.StreetViewPanorama(
      document.getElementById(
        "street-view"
      ),
      {
        position: realPosition,
        pov:{
          heading:34,
          pitch:10
        },
        zoom:1,
        addressControl:false,
        fullscreenControl:false
      }
    );

}

function validateGuess(){

  if(!selectedLatLng){

    alert("Clique sur la map");

    return;
  }

  const guess =
    new google.maps.LatLng(
      selectedLatLng.lat,
      selectedLatLng.lng
    );

  const distance =
    google.maps.geometry
    .spherical
    .computeDistanceBetween(
      realPosition,
      guess
    );

  const distanceKm =
    (distance / 1000).toFixed(2);

  /* FULLSCREEN UNIQUEMENT
     APRÈS VALIDATION */

  mapContainer.classList.add(
    "fullscreen"
  );

  setTimeout(() => {
    map.invalidateSize();
  }, 500);

  // BON POINT

  realMarker = L.marker([
    realPosition.lat(),
    realPosition.lng()
  ]).addTo(map);

  // LIGNE

  line = L.polyline([
    [
      selectedLatLng.lat,
      selectedLatLng.lng
    ],
    [
      realPosition.lat(),
      realPosition.lng()
    ]
  ]).addTo(map);

  // ZOOM

  map.fitBounds(
    line.getBounds(),
    {
      padding:[100,100]
    }
  );

  // DISTANCE

  distanceText.innerHTML =
    distanceKm + " km";

  // RESULT BOX

  resultBox.style.display =
    "block";

}

function nextRound(){

  if(playerMarker)
    map.removeLayer(playerMarker);

  if(realMarker)
    map.removeLayer(realMarker);

  if(line)
    map.removeLayer(line);

  selectedLatLng = null;

  map.setView(
    [46.603354,1.888334],
    5
  );

  startRound();

}

window.onload = initGame;

</script>

</body>
</html>
